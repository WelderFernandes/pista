<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim fixed top-0 w-full border-b border-outline-variant dark:border-outline flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 w-full z-50">
<div class="flex items-center gap-sm">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors cursor-pointer active:scale-95 text-on-surface" onclick="history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">Volante Certo</h1>
</div>
<div class="flex items-center">
<!-- No trailing icon for transactional screen -->
</div>
</header>
<!-- Main Content Canvas (Navigation suppressed for transactional screen) -->
<main class="flex-grow pt-24 pb-margin-mobile px-margin-mobile md:px-margin-desktop max-w-3xl mx-auto w-full">
<div class="mb-lg">
<h2 class="font-hero-title-mobile md:font-hero-title text-hero-title-mobile md:text-hero-title text-on-background mb-xs">Novo Serviço</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Configure os detalhes do serviço que você irá oferecer.</p>
</div>
<form class="space-y-md bg-surface-container-lowest p-md md:p-lg rounded-xl border border-outline-variant shadow-sm">
<!-- Service Name -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="serviceName">Nome do Serviço</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">design_services</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body-md text-body-md text-on-surface placeholder-outline" id="serviceName" placeholder="Ex: Aula Prática, Treinamento de Baliza" required="" type="text"/>
</div>
</div>
<!-- Grid for Duration and Price -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Duration -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="duration">Duração Padrão</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">schedule</span>
</div>
<select class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body-md text-body-md text-on-surface appearance-none" id="duration">
<option value="45">45 minutos</option>
<option selected="" value="50">50 minutos</option>
<option value="60">60 minutos (1 hora)</option>
<option value="90">90 minutos (1h 30m)</option>
<option value="120">120 minutos (2 horas)</option>
</select>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
</div>
<!-- Price -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="price">Valor (R$)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">payments</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body-md text-body-md text-on-surface placeholder-outline" id="price" min="0" placeholder="0,00" required="" step="0.01" type="number"/>
</div>
</div>
</div>
<!-- Description -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="description">Descrição (Opcional)</label>
<textarea class="block w-full p-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body-md text-body-md text-on-surface placeholder-outline resize-none" id="description" placeholder="Breve descrição sobre o que está incluído neste serviço..." rows="3"></textarea>
<p class="mt-2 font-label-sm text-label-sm text-on-surface-variant text-right">0/150 caracteres</p>
</div>
<!-- Submit Button (Amba/Tertiary based on prompt request for 'Laranja Tráfego' style) -->
<div class="pt-sm border-t border-outline-variant">
<button class="w-full md:w-auto md:float-right flex items-center justify-center gap-2 hover:bg-tertiary/90 font-label-sm text-label-sm py-3 px-6 rounded-full shadow-sm hover:shadow-md transition-all active:scale-95 bg-primary text-on-primary" type="submit">
<span class="material-symbols-outlined icon-fill">save</span>
                    Salvar Serviço
                </button>
<div class="clear-both"></div>
</div>
</form>
</main>
</body></html>
