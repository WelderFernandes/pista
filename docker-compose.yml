version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pista-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secure_password123
      POSTGRES_DB: pista
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
